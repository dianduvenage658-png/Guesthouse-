<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secunda Guesthouse Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <h2>🏡 Secunda Guesthouse</h2>
</nav>

<header>
  <h1>Book Your Stay 🔥</h1>
  <p>Simple • Fast • Reliable</p>
</header>

<!-- BOOKING BOX -->
<section class="booking">
  <h2>Booking System 📅</h2>

  <label>Check-in:</label>
  <input type="date" id="checkin">

  <label>Check-out:</label>
  <input type="date" id="checkout">

  <label>Guests:</label>
  <input type="number" id="guests" min="1" value="1">

  <label>Room Type:</label>
  <select id="room">
    <option value="600">Standard - R600</option>
    <option value="900">Deluxe - R900</option>
    <option value="1200">Family - R1200</option>
  </select>

  <button onclick="calculate()">Calculate Price</button>

  <h3 id="total">Total: R0</h3>

  <a id="bookBtn" class="btn" target="_blank">Book on WhatsApp</a>
</section>

<footer>
  <p>© 2026 Secunda Guesthouse</p>
</footer>

<script>
function calculate() {
  let inDate = new Date(document.getElementById("checkin").value);
  let outDate = new Date(document.getElementById("checkout").value);
  let roomPrice = parseInt(document.getElementById("room").value);

  let days = (outDate - inDate) / (1000 * 60 * 60 * 24);

  if (days <= 0 || isNaN(days)) {
    document.getElementById("total").innerText = "Select valid dates";
    return;
  }

  let total = days * roomPrice;

  document.getElementById("total").innerText = "Total: R" + total;

  let msg = `Hi I want to book:%0ACheck-in: ${inDate.toDateString()}%0ACheck-out: ${outDate.toDateString()}%0AGuests: ${document.getElementById("guests").value}%0ATotal: R${total}`;

  document.getElementById("bookBtn").href =
    "https://wa.me/27662395402?text=" + msg;
}
</script>

</body>
</html>
